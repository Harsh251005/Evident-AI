name: AI Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  evaluate_rag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('stopwords')"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('stopwords')"

      # THE NEW STEP: Create the local BM25 index
      - name: Warm-up Ingestion (Generate BM25 Index)
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m main --file "data/sample_pdf/claudes-constitution_webPDF_26-02.02a.pdf" --ingest-only

      - name: Run Golden Dataset Evaluation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          LANGCHAIN_TRACING_V2: "true"
        run: |
          # 1. Run the evals to generate the experiment
          python -m src.evaluation.run_evals > eval_output.txt
          
          # 2. Extract the Experiment Name from the output
          EXP_NAME=$(grep "Experiment Name" eval_output.txt | awk '{print $NF}')
          echo "LANGSMITH_PROJECT_NAME=$EXP_NAME" >> $GITHUB_ENV

      - name: Enforcement Gate
        env:
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
        run: |
          # This will exit with code 1 if citation < 80%, failing the build
          python -m src.evaluation.eval_gate